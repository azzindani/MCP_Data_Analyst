name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --all-packages --dev
          uv tool install ruff

      - name: Lint with ruff
        run: |
          ruff check servers/ shared/ tests/ --exclude "**/.venv/**"

      - name: Run tests
        run: |
          uv run --package mcp-data-analyst pytest tests/ -v --tb=short
