name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Cross-platform test matrix ──────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    env:
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      # ── Linting & static analysis ──
      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run pyright servers/ shared/

      - name: Verify tool docstrings
        run: uv run python verify_tool_docstrings.py

      - name: Verify output path priority
        run: uv run python verify_output_paths.py

      # ── Tests ──
      - name: Run tests
        run: uv run python -m pytest tests/ -q --tb=short

  # ── Constrained mode (8 GB VRAM target) ─────────────────────────────
  constrained:
    name: Constrained mode (ubuntu)
    runs-on: ubuntu-22.04

    env:
      MCP_CONSTRAINED_MODE: "1"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests in constrained mode
        run: uv run python -m pytest tests/ -q --tb=short
